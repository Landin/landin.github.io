<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSpace | Portfolio & Tutorials</title>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .nav-link-active { @apply text-indigo-600 border-b-2 border-indigo-600; }
        
        /* Glassmorphism utility */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- NAVBAR (Fast position) -->
    <nav class="fixed top-0 w-full glass border-b border-slate-200 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="#home" class="flex items-center gap-2 font-black text-xl tracking-tighter hover:opacity-80 transition">
                <div class="bg-indigo-600 p-1.5 rounded-lg text-white">
                    <i data-lucide="terminal" class="w-5 h-5"></i>
                </div>
                <span>DEV<span class="text-indigo-600">SPACE</span></span>
            </a>
            
            <div class="hidden md:flex gap-8 font-bold text-sm">
                <a href="#home" class="nav-item py-5 transition hover:text-indigo-600">Hem</a>
                <a href="#projects" class="nav-item py-5 transition hover:text-indigo-600">Projekt</a>
                <a href="#tutorials" class="nav-item py-5 transition hover:text-indigo-600">Tutorials</a>
            </div>

            <div class="flex items-center gap-4">
                <a href="https://github.com" class="text-slate-400 hover:text-slate-900 transition">
                    <i data-lucide="github" class="w-6 h-6"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- ROUTER VIEW (Här laddas allt innehåll) -->
    <main id="router-view" class="pt-24 min-h-screen">
        <div class="flex items-center justify-center h-64 text-slate-400">
            Laddar...
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="border-t border-slate-200 bg-white py-12 mt-20">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-slate-400 text-sm">© 2024 Designat för GitHub Pages.</p>
            <div class="flex gap-6 text-slate-400">
                <i data-lucide="cpu" class="w-5 h-5"></i>
                <i data-lucide="code-2" class="w-5 h-5"></i>
                <i data-lucide="database" class="w-5 h-5"></i>
            </div>
        </div>
    </footer>

    <script>
        // --- 1. DATABAS ---
        const contentDB = {
            projects: [
                { 
                    slug: "esp32", 
                    title: "ESP32 IoT Sensor", 
                    desc: "Hämta realtidsdata via Wi-Fi med ESP32.",
                    isExternal: true // Denna laddas från projects/esp32.html
                },
                { 
                    slug: "portfolio-site", 
                    title: "Denna Webbplats", 
                    desc: "Byggd med Vanilla JS och en custom router.",
                    isExternal: false,
                    longDesc: "Detta projekt skapades för att visa hur man bygger en SPA (Single Page Application) utan tunga ramverk som React.",
                    tech: ["HTML5", "Tailwind", "JavaScript"]
                }
            ],
            tutorials: [
                { 
                    slug: "git-guide", 
                    title: "Git för Nybörjare", 
                    desc: "Lär dig branchning och pull requests.",
                    isExternal: false,
                    body: "Här kommer en lång guide om Git..."
                }
            ]
        };

        // --- 2. ROUTER LOGIK ---
        async function handleRoute() {
            const view = document.getElementById('router-view');
            const hash = window.location.hash.replace('#', '') || 'home';
            const [path, slug] = hash.split('/');

            // Markera aktiv länk i nav
            updateNav(path);

            // A. UNDERSIDA (t.ex. #projects/esp32)
            if (slug && contentDB[path]) {
                const item = contentDB[path].find(i => i.slug === slug);
                
                if (item) {
                    if (item.isExternal) {
                        // HÄMTA EXTERN FIL
                        view.innerHTML = `<div class="max-w-3xl mx-auto px-6 py-20 text-slate-400">Laddar fil...</div>`;
                        try {
                            const response = await fetch(`projects/${slug}.html`);
                            if (!response.ok) throw new Error("Fil saknas");
                            const html = await response.text();
                            view.innerHTML = `<div class="fade-in">${html}</div>`;
                        } catch (err) {
                            view.innerHTML = renderError("Kunde inte ladda den externa filen.");
                        }
                    } else {
                        // RENDERA FRÅN JS-DATA
                        view.innerHTML = renderDetailPage(item, path);
                    }
                } else {
                    view.innerHTML = renderError("Sidan hittades inte.");
                }
            } 
            // B. HUVUDSIDOR
            else if (path === 'home') {
                view.innerHTML = renderHome();
            } 
            else if (path === 'projects' || path === 'tutorials') {
                view.innerHTML = renderListPage(path === 'projects' ? 'Mina Projekt' : 'Tutorials', contentDB[path], path);
            } 
            else {
                view.innerHTML = renderError("404 - Sidan finns inte.");
            }

            // Uppdatera ikoner och scrolla upp
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        // --- 3. TEMPLATES (HTML-MALLAR) ---

        function renderHome() {
            return `
                <div class="max-w-4xl mx-auto px-6 py-20 md:py-32 text-center fade-in">
                    <span class="bg-indigo-100 text-indigo-600 px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase">Tillgänglig för uppdrag</span>
                    <h1 class="text-6xl md:text-8xl font-black mt-8 mb-8 tracking-tighter">Code. Create. <span class="text-indigo-600 italic">Repeat.</span></h1>
                    <p class="text-xl text-slate-500 mb-12 max-w-2xl mx-auto leading-relaxed text-italic underline decoration-indigo-200 underline-offset-8">Välkommen till min digitala trädgård där jag delar med mig av allt jag bygger.</p>
                    <div class="flex flex-wrap justify-center gap-4">
                        <a href="#projects" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-indigo-600 transition-all flex items-center gap-2">Utforska Projekt <i data-lucide="arrow-right" class="w-5 h-5"></i></a>
                    </div>
                </div>
            `;
        }

        function renderListPage(title, items, path) {
            return `
                <div class="max-w-6xl mx-auto px-6 fade-in">
                    <h1 class="text-5xl font-black mb-12 tracking-tight">${title}</h1>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${items.map(item => `
                            <a href="#${path}/${item.slug}" class="group bg-white p-8 rounded-[2rem] border border-slate-200 hover:border-indigo-400 hover:shadow-2xl hover:shadow-indigo-100 transition-all duration-300 flex flex-col h-full">
                                <div class="mb-6 bg-slate-50 w-12 h-12 rounded-xl flex items-center justify-center text-slate-400 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                                    <i data-lucide="${path === 'projects' ? 'layers' : 'book-open'}" class="w-6 h-6"></i>
                                </div>
                                <h3 class="text-2xl font-bold mb-4">${item.title}</h3>
                                <p class="text-slate-500 leading-relaxed flex-grow italic">"${item.desc}"</p>
                                <div class="mt-8 flex items-center gap-2 text-indigo-600 font-bold text-sm">
                                    Visa mer <i data-lucide="chevron-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderDetailPage(item, path) {
            return `
                <div class="max-w-3xl mx-auto px-6 fade-in pb-20">
                    <a href="#${path}" class="text-slate-400 hover:text-indigo-600 font-bold flex items-center gap-2 mb-10 transition">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Tillbaka till ${path}
                    </a>
                    <h1 class="text-5xl font-black mb-6 tracking-tight">${item.title}</h1>
                    <div class="prose prose-slate max-w-none">
                        <p class="text-xl text-slate-600 leading-relaxed mb-8">${item.longDesc || item.body}</p>
                    </div>
                    ${item.tech ? `
                        <div class="flex gap-2 mt-10">
                            ${item.tech.map(t => `<span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest">${t}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderError(msg) {
            return `<div class="text-center py-20"><h2 class="text-2xl font-bold">${msg}</h2><a href="#home" class="text-indigo-600 underline">Gå hem</a></div>`;
        }

        function updateNav(path) {
            document.querySelectorAll('.nav-item').forEach(link => {
                const linkPath = link.getAttribute('href').replace('#', '');
                link.classList.toggle('nav-link-active', linkPath === path);
            });
        }

        // --- 4. EVENT LISTENERS ---
        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', handleRoute);

    </script>
</body>
</html>
